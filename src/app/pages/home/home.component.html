<div class="home">
    <div class="home__header">
        <app-filter-list
            [(currentGameList)]="currentGameList"
        ></app-filter-list>

        <div class="home__buttons-block">
            <app-settings></app-settings>

            <button
                color="accent"
                mat-fab
                aria-label="Добавить игру"
                matTooltip="Добавить игру"
                (click)="goToAddGame()"
            >
                <mat-icon>add</mat-icon>
            </button>
        </div>
    </div>

    <app-games-list [gameList]="currentGameList"></app-games-list>
</div>
