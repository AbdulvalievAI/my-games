<div class="home">
    <div class="home__head">
        <app-header>
            <div modal-left>
                <app-filter-list
                    [(gamesList)]="gamesList"
                    (dataLoadedChange)="dataLoaded($event)"
                ></app-filter-list>
            </div>
            <div modal-right>
                <app-settings></app-settings>

                <button
                    color="accent"
                    mat-fab
                    matTooltip="Добавить игру"
                    (click)="explorerService.goToAddGame()"
                >
                    <mat-icon>add</mat-icon>
                </button>
            </div>
        </app-header>
    </div>

    <div class="home__body">
        @if (!isLoad) {
            <app-games-list [gamesList]="gamesList"></app-games-list>
        } @else {
            <mat-spinner [diameter]="75"></mat-spinner>
        }
    </div>
</div>
