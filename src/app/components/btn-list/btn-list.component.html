@if (buttonsList?.length) {
    <div class="btn-list">
        <mat-action-list [className]="orientation">
            @for (btn of buttonsList; track btn) {
                <div class="btn-list__item">
                    <mat-list-item
                        (click)="clickItem.emit(btn)"
                        [disabled]="disabled"
                    >
                        {{ btn.name }}
                    </mat-list-item>

                    @if (btnConfig) {
                        <button
                            class="btn-list__right"
                            mat-fab
                            [color]="btnConfig.color"
                            [matTooltip]="btnConfig.title"
                            [disabled]="disabled"
                            (click)="clickBtn.emit(btn)"
                        >
                            <mat-icon>{{ btnConfig.icon }}</mat-icon>
                        </button>
                    }
                </div>
            }
        </mat-action-list>
    </div>
}
