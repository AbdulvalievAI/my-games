<mat-list role="list">
  @for (game of gameList; track game; let i = $index) {
    <mat-list-item
      role="listitem"
      class="mat-mdc-list-item-interactive"
      >
      <game-card [gameData]="game" [index]="i"></game-card>
    </mat-list-item>
  }

  @if (!gameList.length) {
    <img class="emptyList" src="/assets/empty.jpg" alt="">
  }
</mat-list>
