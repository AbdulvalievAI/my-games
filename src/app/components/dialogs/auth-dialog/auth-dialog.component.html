<mat-card class="auth">
    <mat-card-header class="auth__header">
        <mat-card-title>
            @if (authService.isAuthorized()) {
                <mat-icon class="green mr" matTooltip="Авторизован">
                    check_circle
                </mat-icon>
            } @else {
                <mat-icon class="red mr" matTooltip="Не авторизован">
                    error
                </mat-icon>
            }
            Авторизация в Яндекс Диск
        </mat-card-title>
    </mat-card-header>

    <mat-card-content>
        <form [formGroup]="authForm">
            @if (!!this.authForm.get("clientId")) {
                <mat-form-field
                    appearance="outline"
                    subscriptSizing="dynamic"
                    class="auth__field"
                >
                    <mat-label>ID клиента</mat-label>

                    <input
                        matInput
                        placeholder="ID клиента"
                        formControlName="clientId"
                    />
                </mat-form-field>
            }

            @if (!!this.authForm.get("token")) {
                <mat-form-field
                    appearance="outline"
                    subscriptSizing="dynamic"
                    class="auth__field"
                >
                    <mat-label>Токен</mat-label>

                    <textarea
                        matInput
                        placeholder="Токен"
                        rows="5"
                        formControlName="token"
                    ></textarea>
                </mat-form-field>

                @if (!authService.isAuthorized()) {
                    <div class="auth__login">
                        <button
                            matFab
                            extended
                            class="mat-button black"
                            [disabled]="!authForm.controls.clientId?.valid"
                            (click)="login()"
                        >
                            <img
                                src="/assets/yandex.png"
                                alt="Icon"
                                width="30"
                                height="30"
                                class="mr"
                            />
                            Получить токен Яндекс.Диск
                        </button>
                    </div>
                }
            }
        </form>
    </mat-card-content>

    <mat-card-actions align="end">
        @if (authService.isAuthorized()) {
            <button matFab extended class="mat-button black" (click)="logout()">
                <mat-icon>exit_to_app</mat-icon>
                Выйти из Яндекс Диск
            </button>
        } @else {
            <button
                color="accent"
                matFab
                extended
                matTooltip="Сохранить"
                [disabled]="!authForm.valid"
                (click)="save()"
            >
                <mat-icon>save</mat-icon>
                Сохранить
            </button>
        }
    </mat-card-actions>
</mat-card>
