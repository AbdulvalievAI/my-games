<mat-card>
    <mat-card-header>
        <mat-card-title> Выгрузка даных </mat-card-title>
    </mat-card-header>

    <mat-card-content class="mt mb">
        <app-btn-list
            [buttonsList]="dataList"
            [btnConfig]="btnConfig"
            (clickBtn)="selectData($event)"
        ></app-btn-list>
    </mat-card-content>

    <mat-card-actions align="end">
        <button matFab extended color="accent" (click)="downloadAllFiles()">
            <mat-icon>content_copy</mat-icon>
            Скачать всё
        </button>
    </mat-card-actions>
</mat-card>
