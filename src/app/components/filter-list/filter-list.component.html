@if (filterForm) {
    <form [formGroup]="filterForm">
        <mat-form-field appearance="outline">
            <mat-label>Поиск игры</mat-label>

            <input matInput placeholder="Поиск игры" formControlName="search" />

            @if (isSpinner) {
                <mat-icon matSuffix>
                    <mat-spinner [diameter]="25"></mat-spinner>
                </mat-icon>
            }
        </mat-form-field>

        <mat-form-field appearance="outline" style="margin-left: 15px">
            <mat-label>Платформа</mat-label>

            <mat-select formControlName="platform">
                <!-- <mat-select-trigger>
                    <div class="platforms-selected-list">
                        <div class="platforms-selected-item">
                            <img
                                class="logo-platform"
                                [src]="filterForm.value.platform?.logo"
                                [alt]="filterForm.value.platform?.logo"
                            />
                            <span>{{ filterForm.value.platform?.name }}</span>
                        </div>
                    </div>
                </mat-select-trigger> -->

                @for (platform of platformList; track platform) {
                    <mat-option [value]="platform">
                        <div class="container-platform">
                            <img
                                class="logo-platform"
                                [src]="platform.logo"
                                [alt]="platform.logo"
                            />
                            <span class="name-platform">
                                {{ platform.name }}
                            </span>
                        </div>
                    </mat-option>
                }
            </mat-select>
        </mat-form-field>
    </form>

    <button
        color="warn"
        mat-mini-fab
        extended
        style="margin-left: 1vw"
        aria-label="Сбросить"
        matTooltip="Сбросить"
        (click)="clearFilters()"
    >
        <mat-icon>cleaning_services</mat-icon>
    </button>
}
